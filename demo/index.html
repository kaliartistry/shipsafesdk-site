<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShipSafe SDK — Alert Escalation Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: #0C2340;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }

  .scene {
    position: relative;
    width: 1280px;
    height: 720px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 80px;
  }

  /* Left side — branding */
  .brand-side {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 24px;
    opacity: 0;
    transform: translateX(-30px);
    animation: slideInLeft 0.8s ease-out 0.5s forwards;
  }
  .brand-logo { height: 40px; }
  .brand-title {
    font-size: 32px;
    font-weight: 700;
    color: white;
    line-height: 1.2;
  }
  .brand-title span { color: #00B4D8; }
  .brand-sub {
    font-size: 16px;
    color: rgba(255,255,255,0.5);
    max-width: 320px;
    line-height: 1.5;
  }

  .stage-label {
    margin-top: 16px;
    padding: 10px 20px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.5px;
    transition: all 0.5s ease;
    opacity: 0;
    animation: fadeIn 0.5s ease-out 2s forwards;
  }

  /* Phone frame */
  .phone {
    width: 300px;
    height: 620px;
    background: #1a1a2e;
    border-radius: 40px;
    padding: 12px;
    box-shadow: 0 25px 80px rgba(0,0,0,0.5), 0 0 0 2px rgba(255,255,255,0.08);
    position: relative;
    opacity: 0;
    transform: translateY(30px);
    animation: slideInUp 0.8s ease-out 0.3s forwards;
  }
  .phone-screen {
    width: 100%;
    height: 100%;
    border-radius: 30px;
    overflow: hidden;
    position: relative;
    background: #f8fafc;
  }

  /* Status bar */
  .status-bar {
    height: 44px;
    background: white;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    font-size: 12px;
    font-weight: 600;
    color: #1e293b;
    position: relative;
    z-index: 10;
  }
  .status-bar .time { font-weight: 700; }
  .status-icons { display: flex; gap: 4px; align-items: center; }
  .status-icons svg { width: 16px; height: 16px; }

  /* Map area */
  .map-area {
    position: absolute;
    top: 44px;
    left: 0;
    right: 0;
    bottom: 0;
    background: #eef2f7;
    overflow: hidden;
  }
  .map-area svg { width: 100%; }

  /* Bottom card */
  .bottom-card {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: white;
    border-radius: 20px 20px 0 0;
    padding: 20px;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
    z-index: 20;
    transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .eta-label {
    font-size: 11px;
    font-weight: 600;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .eta-time {
    font-size: 36px;
    font-weight: 800;
    color: #0C2340;
    line-height: 1;
    transition: color 0.5s ease;
  }
  .eta-time span {
    font-size: 16px;
    font-weight: 600;
    color: #94a3b8;
    margin-left: 4px;
  }

  .ship-name {
    font-size: 13px;
    color: #64748b;
    font-weight: 500;
  }

  /* Alert banner */
  .alert-banner {
    margin-top: 14px;
    padding: 14px 16px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .alert-icon {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 18px;
  }
  .alert-text { flex: 1; }
  .alert-title {
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 2px;
  }
  .alert-desc {
    font-size: 11px;
    font-weight: 500;
    opacity: 0.8;
    line-height: 1.3;
  }

  /* Compass bearing bar */
  .bearing-bar {
    margin-top: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: #f1f5f9;
    border-radius: 10px;
    transition: background 0.5s ease;
  }
  .bearing-arrow {
    width: 28px;
    height: 28px;
    transition: transform 1s ease;
  }
  .bearing-text {
    font-size: 12px;
    font-weight: 600;
    color: #475569;
  }
  .bearing-dist {
    margin-left: auto;
    font-size: 12px;
    font-weight: 700;
    color: #0C2340;
  }

  /* Progress bar */
  .progress-track {
    margin-top: 12px;
    height: 4px;
    background: #e2e8f0;
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 2px;
    width: 5%;
    transition: width 0.5s ease, background 0.5s ease;
  }

  /* Alert color schemes */
  .alert-green .alert-banner { background: #f0fdf4; }
  .alert-green .alert-icon { background: #22c55e; color: white; }
  .alert-green .alert-title { color: #15803d; }
  .alert-green .alert-desc { color: #166534; }
  .alert-green .progress-fill { background: #22c55e; }

  .alert-yellow .alert-banner { background: #fefce8; }
  .alert-yellow .alert-icon { background: #f59e0b; color: white; }
  .alert-yellow .alert-title { color: #b45309; }
  .alert-yellow .alert-desc { color: #92400e; }
  .alert-yellow .progress-fill { background: #f59e0b; }
  .alert-yellow .eta-time { color: #b45309; }

  .alert-orange .alert-banner { background: #fff7ed; }
  .alert-orange .alert-icon { background: #f97316; color: white; }
  .alert-orange .alert-title { color: #c2410c; }
  .alert-orange .alert-desc { color: #9a3412; }
  .alert-orange .progress-fill { background: #f97316; }
  .alert-orange .eta-time { color: #c2410c; }
  .alert-orange .bearing-bar { background: #fff7ed; }

  .alert-red .alert-banner { background: #fef2f2; animation: urgentPulse 0.8s ease-in-out infinite; }
  .alert-red .alert-icon { background: #ef4444; color: white; animation: iconPulse 0.6s ease-in-out infinite; }
  .alert-red .alert-title { color: #dc2626; }
  .alert-red .alert-desc { color: #991b1b; }
  .alert-red .progress-fill { background: #ef4444; }
  .alert-red .eta-time { color: #dc2626; }
  .alert-red .bearing-bar { background: #fef2f2; }

  .alert-safe .bottom-card { background: #0C2340; }
  .alert-safe .eta-label { color: rgba(255,255,255,0.5); }
  .alert-safe .eta-time { color: #00B4D8; }
  .alert-safe .eta-time span { color: rgba(255,255,255,0.4); }
  .alert-safe .ship-name { color: rgba(255,255,255,0.5); }
  .alert-safe .alert-banner { background: rgba(0,180,216,0.15); }
  .alert-safe .alert-icon { background: #00B4D8; color: white; }
  .alert-safe .alert-title { color: #00B4D8; }
  .alert-safe .alert-desc { color: rgba(255,255,255,0.7); }
  .alert-safe .bearing-bar { background: rgba(255,255,255,0.08); }
  .alert-safe .bearing-text { color: rgba(255,255,255,0.6); }
  .alert-safe .bearing-dist { color: white; }
  .alert-safe .progress-fill { background: #00B4D8; }
  .alert-safe .progress-track { background: rgba(255,255,255,0.1); }

  .flash { animation: alertFlash 0.4s ease-out; }

  @keyframes alertFlash {
    0% { transform: scale(0.97); opacity: 0.7; }
    50% { transform: scale(1.01); }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes urgentPulse {
    0%, 100% { background: #fef2f2; }
    50% { background: #fee2e2; }
  }
  @keyframes iconPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
  }
  @keyframes slideInUp {
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideInLeft {
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes fadeIn {
    to { opacity: 1; }
  }

  /* Replay button */
  .replay-btn {
    position: absolute;
    bottom: 30px;
    right: 40px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    opacity: 0;
    transition: all 0.3s ease;
  }
  .replay-btn:hover { background: rgba(255,255,255,0.2); }
  .replay-btn.visible { opacity: 1; }
</style>
</head>

<script>
// Walker path waypoints — walks away from ship into city, then turns back
// Format: [x, y] coordinates in SVG space
// Phase 1 (walking AWAY from ship): pier → coastal road → down avenue → into city
// Phase 2 (turning BACK at orange): reverse course back to ship
var awayPath = [
  [138, 60],   // start at pier/ship
  [138, 68],   // step onto coastal road
  [100, 68],   // walk left along coast
  [100, 122],  // south down avenue
  [47, 122],   // west along street
  [47, 176],   // south deeper into city
  [8, 176],    // west edge
  [8, 230]     // furthest point from ship (southwest corner)
];

var returnPath = [
  [8, 230],    // turn around here!
  [47, 230],   // head east
  [47, 176],   // north
  [100, 176],  // east
  [100, 122],  // north up avenue
  [138, 122],  // east to coast road
  [138, 68],   // north along coast
  [138, 60]    // arrive back at pier/ship
];

// Timeline: total 27s. Away phase = 0-17s (green → yellow → early orange). Return = 17-27s (orange turn → red → safe)
var AWAY_DURATION = 17000;
var RETURN_DURATION = 10000;
var START_DELAY = 2000;

function getPathLength(path) {
  var len = 0;
  for (var i = 1; i < path.length; i++) {
    var dx = path[i][0] - path[i-1][0];
    var dy = path[i][1] - path[i-1][1];
    len += Math.sqrt(dx*dx + dy*dy);
  }
  return len;
}

function getPointAtFraction(path, frac) {
  frac = Math.max(0, Math.min(1, frac));
  var totalLen = getPathLength(path);
  var targetDist = frac * totalLen;
  var traveled = 0;
  for (var i = 1; i < path.length; i++) {
    var dx = path[i][0] - path[i-1][0];
    var dy = path[i][1] - path[i-1][1];
    var segLen = Math.sqrt(dx*dx + dy*dy);
    if (traveled + segLen >= targetDist) {
      var segFrac = (targetDist - traveled) / segLen;
      return [
        path[i-1][0] + dx * segFrac,
        path[i-1][1] + dy * segFrac
      ];
    }
    traveled += segLen;
  }
  return path[path.length - 1];
}

// Build SVG path string from waypoints up to a fraction
function buildPathStr(path, frac) {
  var totalLen = getPathLength(path);
  var targetDist = frac * totalLen;
  var d = 'M' + path[0][0] + ',' + path[0][1];
  var traveled = 0;
  for (var i = 1; i < path.length; i++) {
    var dx = path[i][0] - path[i-1][0];
    var dy = path[i][1] - path[i-1][1];
    var segLen = Math.sqrt(dx*dx + dy*dy);
    if (traveled + segLen >= targetDist) {
      var segFrac = (targetDist - traveled) / segLen;
      var px = path[i-1][0] + dx * segFrac;
      var py = path[i-1][1] + dy * segFrac;
      d += ' L' + px.toFixed(1) + ',' + py.toFixed(1);
      break;
    }
    d += ' L' + path[i][0] + ',' + path[i][1];
    traveled += segLen;
  }
  return d;
}

// Animate walker along path
var animStart = null;
function animateWalker(now) {
  if (!animStart) animStart = now;
  var elapsed = now - animStart;

  var pos;
  if (elapsed < AWAY_DURATION) {
    // Walking away from ship
    var frac = Math.min(elapsed / AWAY_DURATION, 1);
    // Ease out for natural deceleration
    var eased = 1 - Math.pow(1 - frac, 2);
    pos = getPointAtFraction(awayPath, eased);

    // Update walked path — away portion only
    var walkedD = buildPathStr(awayPath, eased);
    routeWalked.setAttribute('d', walkedD);
  } else {
    // Walking back to ship
    var returnElapsed = elapsed - AWAY_DURATION;
    var frac = Math.min(returnElapsed / RETURN_DURATION, 1);
    // Ease in-out for urgency feel
    var eased = frac < 0.5 ? 2*frac*frac : 1 - Math.pow(-2*frac+2,2)/2;
    pos = getPointAtFraction(returnPath, eased);

    // Show full away path + return progress
    var fullAway = buildPathStr(awayPath, 1);
    var returnD = buildPathStr(returnPath, eased);
    // Combine: show return path highlighted
    routeWalked.setAttribute('d', returnD);
  }

  walkerDot.setAttribute('cx', pos[0]);
  walkerDot.setAttribute('cy', pos[1]);
  walkerGlow.setAttribute('cx', pos[0]);
  walkerGlow.setAttribute('cy', pos[1]);
  walkerInner.setAttribute('cx', pos[0]);
  walkerInner.setAttribute('cy', pos[1]);

  if (elapsed < AWAY_DURATION + RETURN_DURATION) {
    requestAnimationFrame(animateWalker);
  }
}

// Smooth ETA countdown
function startEtaCountdown() {
  var etaStart = performance.now();
  var totalDuration = 27000;
  var startSecs = 720;
  function tick(now) {
    var elapsed = Math.min((now - etaStart) / totalDuration, 1);
    var secs = Math.round(startSecs * (1 - elapsed));
    var m = Math.floor(secs / 60);
    var s = secs % 60;
    etaTime.innerHTML = m + ':' + (s < 10 ? '0' : '') + s + '<span>min</span>';
    if (elapsed < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

// Hide the walked path initially
routeWalked.setAttribute('d', 'M140,128');

// Start everything after delay
setTimeout(function() {
  requestAnimationFrame(animateWalker);
  startEtaCountdown();
}, START_DELAY);
